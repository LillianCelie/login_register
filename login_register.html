
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - AxisOne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
        }

        .page-layout {
            width: min(1180px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 2.5rem;
        }

        @media (min-width: 1024px) {
            .page-layout {
                grid-template-columns: 1.55fr 1fr;
            }
        }

        .hero-panel {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 3rem;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
        }

        .hero-panel h1 {
            font-size: clamp(3rem, 4vw, 4.5rem);
            line-height: 1.02;
            margin: 0 0 0.75rem;
        }

        .hero-panel p.lead {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.78);
            max-width: 42rem;
            margin-bottom: 2rem;
        }

        .hero-label {
            text-transform: uppercase;
            letter-spacing: 0.35em;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.68);
            margin-bottom: 1rem;
        }

        .animated-copy {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            max-width: 100%;
        }

        #animated-text {
            font-size: clamp(2rem, 3vw, 3.5rem);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        #animated-text::after {
            content: '|';
            animation: blink 1s steps(2, start) infinite;
            color: #ffffff;
            margin-left: 0.2rem;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .auth-panel {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.18);
        }

        .auth-panel h2 {
            margin: 0;
            font-size: 2.5rem;
            color: white;
        }

        .auth-panel p.subtitle {
            margin: 0.75rem 0 0;
            color: rgba(255, 255, 255, 0.7);
        }

        .auth-panel label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }

        .auth-panel input,
        .auth-panel select {
            width: 100%;
            padding: 1rem 1.1rem;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 1.25rem;
            outline: none;
        }

        .auth-panel input::placeholder {
            color: rgba(255, 255, 255, 0.55);
        }

        .auth-panel button {
            width: 100%;
            padding: 1rem;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .auth-panel button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.18);
        }

        .btn-gradient-blue {
            background: linear-gradient(90deg, #4f6eed, #7c5cf6);
            color: white;
        }

        .btn-gradient-green {
            background: linear-gradient(90deg, #16c79a, #22dd8b);
            color: white;
        }

        .auth-panel .link-button {
            color: #cbd5ff;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .auth-panel .message {
            padding: 1rem;
            border-radius: 18px;
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .auth-panel .message.error {
            background: rgba(248, 113, 113, 0.16);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #fee2e2;
        }

        .auth-panel .message.success {
            background: rgba(34, 197, 94, 0.16);
            border: 1px solid rgba(34, 197, 94, 0.28);
            color: #dcfce7;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10">
    <div class="page-layout">
        <section class="hero-panel">
            <div>
                <p class="hero-label">A Central Hub for Business Management</p>
                <h1>AxisOne System</h1>
                <p class="lead">All-in-One Management System</p>
            </div>
            <div>
                <p class="hero-label">Dynamic tools for</p>
                <div class="animated-copy">
                    <span id="animated-text"></span>
                </div>
            </div>
            <br>
            <p class="lead">Manage everything in one place — smarter, faster, easier.</p>
        </section>

        <section class="auth-panel">
            <div class="text-center mb-10">
                <h2>AxisOne</h2>
                <p class="subtitle">Login Portal</p>
            </div>

            <div id="login-form" class="space-y-6">
                <div>
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="Enter your username">
                </div>
                <div>
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password">
                </div>
                <button type="button" onclick="login()" class="btn-gradient-blue">Login</button>
                <p class="text-center text-white/70">
                    Don't have an account? <span onclick="showRegister()" class="link-button">Register</span>
                </p>
                <div id="login-error" class="message error hidden"></div>
            </div>

            <div id="register-form" class="space-y-6 hidden">
                <div>
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="Enter your full name">
                </div>
                <div>
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username">
                </div>
                <div>
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password">
                </div>
                <div>
                    <label for="reg-role">Role</label>
                    <select id="reg-role">
                        <option value="employee">Employee</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="button" onclick="register()" class="btn-gradient-green">Create Account</button>
                <p class="text-center text-white/70">
                    Have an account? <span onclick="showLogin()" class="link-button">Login</span>
                </p>
                <div id="reg-error" class="message error hidden"></div>
            </div>
        </section>
    </div>

    <script>
        const heroPhrases = [
            'Inventory Management',
            'Sales Analytics',
            'Employee Monitoring'
        ];
        let heroIndex = 0;
        let heroPosition = 0;
        let heroDeleting = false;

        function updateHeroText() {
            const textElement = document.getElementById('animated-text');
            const currentPhrase = heroPhrases[heroIndex];

            if (!heroDeleting) {
                heroPosition++;
                textElement.textContent = currentPhrase.slice(0, heroPosition);

                if (heroPosition === currentPhrase.length) {
                    heroDeleting = true;
                    setTimeout(updateHeroText, 1800);
                    return;
                }
            } else {
                heroPosition--;
                textElement.textContent = currentPhrase.slice(0, heroPosition);

                if (heroPosition === 0) {
                    heroDeleting = false;
                    heroIndex = (heroIndex + 1) % heroPhrases.length;
                    setTimeout(updateHeroText, 500);
                    return;
                }
            }

            setTimeout(updateHeroText, heroDeleting ? 50 : 90);
        }

        function startHeroTextAnimation() {
            setTimeout(updateHeroText, 300);
        }

        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showError('login-error', 'Please fill in all fields');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('login', '1');
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch('login_register.php', {
                    method: 'POST',
                    body: formData
                });

                if (response.redirected) {
                    window.location.href = response.url;
                    return;
                }

                const result = await response.text();
                if (result.includes('Invalid username or password')) {
                    showError('login-error', 'Invalid username or password!');
                } else {
                    window.location.reload();
                }
            } catch (error) {
                showError('login-error', 'Login failed. Please try again.');
            }
        }

        async function register() {
            const name = document.getElementById('reg-name').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;

            if (!name || !username || !password) {
                showError('reg-error', 'Please fill in all fields');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('register', '1');
                formData.append('name', name);
                formData.append('username', username);
                formData.append('password', password);
                formData.append('role', role);

                const response = await fetch('login_register.php', {
                    method: 'POST',
                    body: formData
                });

                if (response.redirected) {
                    window.location.href = response.url;
                    return;
                }

                const result = await response.text();
                if (result.includes('already registered')) {
                    showError('reg-error', 'Username is already registered!');
                } else {
                    showSuccess('reg-error', 'Registration successful! Please login.');
                    setTimeout(showLogin, 2000);
                }
            } catch (error) {
                showError('reg-error', 'Registration failed. Please try again.');
            }
        }

        function showError(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.classList.remove('hidden');
        }

        function showSuccess(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.classList.remove('hidden');
            el.classList.remove('error');
            el.classList.add('success');
        }

        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('login-error')?.classList.add('hidden');
            document.getElementById('reg-error')?.classList.add('hidden');
        }

        function showLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('reg-error')?.classList.add('hidden');
            document.getElementById('login-error')?.classList.add('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('register-form').classList.contains('hidden')) {
                    register();
                } else {
                    login();
                }
            }
        });

        startHeroTextAnimation();
    </script>
</body>
</html>
